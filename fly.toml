# fly.toml — mobilwallet-backend
# Doc : https://fly.io/docs/reference/configuration/

app = 'mobilwallet-backend'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 7332          # l'app uvicorn écoute sur 7332 (cf. PORT)
  force_https = true
  # Auto-stop activé : la machine s'éteint quand inactive et se réveille à la
  # 1re requête HTTP entrante (auto_start). min_machines_running=0 -> aucune
  # machine forcée UP. ⚠️ Un polling /pay en cours (sans trafic entrant) ou un
  # webhook arrivant machine éteinte peut être manqué/tué ; repasser
  # min_machines_running=1 si le webhook/polling doit rester garanti.
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'                # Chromium (Playwright) a besoin de RAM
  cpu_kind = 'shared'
  cpus = 1
